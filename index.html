<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Customer shipment visibility, cost allocation, and container utilization in one portal.">
  <title>ACCEM Connect · CaroTrans Customer Portal</title>
  <style>:root {
  --canvas: #f5f7fa;
  --surface: #ffffff;
  --ink: #152235;
  --muted: #667287;
  --faint: #99a4b5;
  --line: #e2e7ee;
  --line-strong: #d4dbe5;
  --accent: #f2a30b;
  --accent-deep: #d98d00;
  --accent-soft: #fff3cb;
  --green: #08775c;
  --green-soft: #def4eb;
  --blue: #2759a5;
  --blue-soft: #e7eefb;
  --red: #b72b3f;
  --red-soft: #fae4e8;
  --shadow: 0 2px 8px rgba(21, 34, 53, 0.07);
}

* { box-sizing: border-box; }
html { background: var(--canvas); }
body { margin: 0; background: var(--canvas); color: var(--ink); font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; -webkit-font-smoothing: antialiased; }
button, input, select { font: inherit; }
button { color: inherit; }
button:focus-visible, input:focus-visible, label:has(input:focus-visible) { outline: 3px solid rgba(242, 163, 11, .35); outline-offset: 2px; }

.app-shell { min-height: 100vh; }
.utility-bar { height: 30px; background: #101c2d; color: #dce3eb; display: flex; align-items: center; justify-content: space-between; padding: 0 34px; font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
.utility-right { display: flex; align-items: center; gap: 8px; color: #9ba9ba; }
.live-dot { width: 6px; height: 6px; background: #34c492; border-radius: 50%; }
.top-nav { position: sticky; top: 0; z-index: 40; min-height: 70px; background: rgba(255,255,255,.96); backdrop-filter: blur(18px); border-bottom: 1px solid var(--line); display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 24px; padding: 0 32px; box-shadow: 0 1px 0 rgba(21,34,53,.02); }
.brand { border: 0; background: transparent; display: flex; align-items: center; gap: 10px; padding: 0; cursor: pointer; font-weight: 850; font-size: 21px; letter-spacing: -.035em; }
.brand small { color: var(--accent-deep); border-left: 1px solid var(--line-strong); padding-left: 10px; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; }
.brand-mark { width: 34px; height: 34px; border-radius: 10px; background: var(--ink); display: flex; flex-direction: column; justify-content: center; gap: 3px; padding: 9px 8px; }
.brand-mark i { display: block; height: 2px; background: white; border-radius: 2px; }
.brand-mark i:nth-child(2) { width: 72%; }
.brand-mark i:nth-child(3) { width: 46%; }
.top-nav nav { display: flex; align-items: center; gap: 5px; overflow-x: auto; scrollbar-width: none; }
.nav-item { border: 0; background: transparent; padding: 11px 12px; border-radius: 10px; color: var(--muted); font-size: 13px; font-weight: 680; white-space: nowrap; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
.nav-item:hover { background: #f2f4f7; color: var(--ink); }
.nav-item.active { background: var(--ink); color: white; box-shadow: var(--shadow); }
.nav-item span { opacity: .72; font-size: 12px; }
.nav-tools { display: flex; align-items: center; gap: 12px; }
.global-search { width: 216px; height: 39px; border: 1px solid var(--line); background: #fafbfc; border-radius: 20px; display: flex; align-items: center; padding: 0 13px; gap: 7px; color: var(--faint); }
.global-search input { border: 0; outline: 0; width: 100%; background: transparent; color: var(--ink); font-size: 12px; }
.avatar { width: 36px; height: 36px; border: 0; border-radius: 50%; background: var(--green); color: white; font-weight: 800; font-size: 11px; cursor: pointer; }

main { width: min(1460px, 100%); margin: 0 auto; padding: 34px 34px 70px; }
.edge-main { width: 100%; }
.page-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; padding: 4px 0 26px; border-bottom: 1px solid var(--line-strong); }
.eyebrow, .section-kicker { margin: 0 0 8px; color: var(--accent-deep); font-size: 10px; line-height: 1.2; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; }
h1, h2, p { margin-top: 0; }
h1 { margin-bottom: 8px; font-size: clamp(30px, 4vw, 45px); line-height: 1; letter-spacing: -.045em; font-weight: 780; }
.page-description { margin: 0; color: var(--muted); font-size: 14px; }
.header-actions { display: flex; align-items: center; justify-content: flex-end; gap: 10px; flex-wrap: wrap; }
.button { border: 1px solid transparent; border-radius: 10px; padding: 11px 17px; font-size: 12px; font-weight: 750; cursor: pointer; transition: .18s ease; }
.button.primary { background: var(--ink); color: white; }
.button.primary:hover { background: #25344a; transform: translateY(-1px); }
.button.secondary { background: white; border-color: var(--line-strong); color: var(--ink); }
.button.secondary:hover { border-color: #aeb8c6; }
.button.small { padding: 7px 13px; border-radius: 8px; }
.upload-button { position: relative; display: inline-flex; align-items: center; justify-content: center; white-space: nowrap; }
.upload-button input { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
.button.action-complete { border-color: #aad9ca; background: var(--green-soft); color: var(--green); }
.text-button, .breadcrumb { border: 0; background: transparent; color: var(--blue); font-size: 12px; font-weight: 700; cursor: pointer; padding: 0; }
.breadcrumb { color: var(--muted); margin-bottom: 20px; }
.breadcrumb strong { color: var(--ink); }

.metric-strip { display: grid; background: var(--surface); border: 1px solid var(--line); border-radius: 14px; margin: 22px 0; overflow: hidden; box-shadow: 0 1px 2px rgba(21,34,53,.02); }
.metric-strip-four, .insight-metrics { grid-template-columns: repeat(4, 1fr); }
.metric-strip-three { grid-template-columns: repeat(3, 1fr); }
.metric-cell { min-height: 132px; padding: 22px 24px; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid var(--line); }
.metric-cell:last-child { border-right: 0; }
.metric-label { color: var(--faint); font-size: 10px; line-height: 1.2; letter-spacing: .12em; text-transform: uppercase; font-weight: 760; }
.metric-value { margin: 8px 0 4px; font-size: clamp(31px, 3.5vw, 42px); line-height: 1; letter-spacing: -.045em; font-weight: 770; }
.metric-detail { color: var(--muted); font-size: 11px; }
.metric-green, .detail-green { color: var(--green); }
.metric-amber, .detail-amber { color: var(--accent-deep); }
.metric-blue, .detail-blue { color: var(--blue); }

.content-grid { display: grid; gap: 22px; margin-top: 22px; }
.dashboard-grid { grid-template-columns: minmax(0, 1.8fr) minmax(310px, .62fr); }
.shipment-grid { grid-template-columns: minmax(0, 1.2fr) minmax(350px, .55fr); }
.insight-chart-grid { grid-template-columns: 1.25fr .75fr; }
.insight-bottom-grid { grid-template-columns: 1.35fr .65fr; }
.side-stack { display: flex; flex-direction: column; gap: 22px; }
.panel { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; box-shadow: 0 1px 2px rgba(21,34,53,.025); overflow: hidden; }
.panel-heading { min-height: 74px; display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 19px 22px; border-bottom: 1px solid var(--line); }
.panel-heading h2 { margin: 0; font-size: 17px; letter-spacing: -.02em; }
.panel-heading .section-kicker { margin-bottom: 5px; }
.helper-text { color: var(--faint); font-size: 11px; }
.compact-panel { padding-bottom: 8px; }
.value-card { padding: 24px; background: var(--ink); color: white; }
.value-card .section-kicker { color: #efb84d; }
.value-card h2 { max-width: 280px; margin-bottom: 32px; font-size: 23px; letter-spacing: -.03em; }
.value-number { font-size: 56px; font-weight: 780; line-height: 1; letter-spacing: -.06em; }
.value-card > p:not(.section-kicker) { color: #bcc7d4; margin: 5px 0 20px; font-size: 12px; }
.mini-progress { height: 7px; border-radius: 5px; background: rgba(255,255,255,.13); overflow: hidden; }
.mini-progress span { display: block; height: 100%; background: var(--accent); border-radius: 5px; }
.value-footer { margin-top: 11px; color: #9eadbe; font-size: 11px; }
.value-footer span { color: #53d7ad; font-weight: 760; }
.container-banner { margin-top: 22px; overflow: hidden; border-radius: 15px; background: var(--ink); color: white; box-shadow: 0 12px 30px rgba(21,34,53,.13); }
.container-banner-top { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 22px 24px 18px; }
.container-banner-top .section-kicker { color: var(--accent); margin-bottom: 6px; }
.container-banner-top h2 { margin: 0; color: white; font-size: 24px; letter-spacing: -.035em; }
.container-banner-top .status-green { color: #81e2c3; background: rgba(50,196,146,.14); }
.container-meta { display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1px solid rgba(255,255,255,.1); border-bottom: 1px solid rgba(255,255,255,.1); }
.container-meta > div { min-width: 0; padding: 17px 24px; border-right: 1px solid rgba(255,255,255,.1); }
.container-meta > div:last-child { border-right: 0; }
.container-meta span, .container-meta strong { display: block; }
.container-meta span { color: #8f9db0; font-size: 8px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
.container-meta strong { margin-top: 7px; overflow: hidden; color: #f2f5f8; font-size: 11px; text-overflow: ellipsis; white-space: nowrap; }
.container-milestones { display: grid; grid-template-columns: repeat(5, minmax(140px, 1fr)); min-width: 760px; padding: 22px 24px 24px; overflow-x: auto; }
.container-milestone { position: relative; min-width: 0; padding-right: 20px; }
.container-milestone::after { content: ""; position: absolute; z-index: 0; top: 12px; left: 30px; right: 8px; height: 2px; background: rgba(255,255,255,.16); }
.container-milestone:last-child::after { display: none; }
.container-milestone.complete::after { background: var(--green); }
.milestone-marker { position: relative; z-index: 1; width: 25px; height: 25px; padding: 3px; border-radius: 50%; background: #425066; }
.milestone-marker span { width: 100%; height: 100%; display: grid; place-items: center; border-radius: 50%; color: #c9d1dc; font-size: 8px; font-weight: 850; }
.container-milestone.complete .milestone-marker { background: var(--green); }
.container-milestone.complete .milestone-marker span { color: white; }
.container-milestone.current .milestone-marker { background: var(--accent); box-shadow: 0 0 0 5px rgba(242,163,11,.13); }
.container-milestone.current .milestone-marker span { background: var(--ink); color: var(--accent); }
.container-milestone > strong, .container-milestone > small { display: block; }
.container-milestone > strong { margin-top: 11px; color: #eef2f6; font-size: 10px; }
.container-milestone > small { margin-top: 5px; color: #8f9db0; font-size: 8px; }
.container-milestone.current > strong, .container-milestone.current > small { color: var(--accent); }
.overview-main-stack { min-width: 0; }
.upcoming-card tbody tr { cursor: pointer; }
.arrival-cube { display: flex; align-items: center; gap: 9px; }
.arrival-cube i { width: 62px; height: 6px; background: #e9edf2; border-radius: 4px; overflow: hidden; }
.arrival-cube b { display: block; height: 100%; background: var(--accent); border-radius: 4px; }
.arrival-cube em { color: var(--ink); font-style: normal; font-family: "SFMono-Regular", Consolas, monospace; }

.filter-bar { min-height: 66px; background: white; border: 1px solid var(--line); border-radius: 14px; padding: 10px 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 22px 0 14px; box-shadow: var(--shadow); }
.filter-label { color: var(--faint); font-size: 10px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; padding: 0 5px; }
.filter-chip { border: 1px solid var(--line-strong); background: #fff; border-radius: 22px; padding: 8px 16px; color: var(--muted); font-size: 12px; font-weight: 650; cursor: pointer; box-shadow: 0 1px 3px rgba(21,34,53,.05); }
.filter-chip:hover { border-color: #afb9c7; color: var(--ink); }
.filter-chip.selected { color: var(--ink); background: var(--accent); border-color: var(--accent); box-shadow: none; }
.filter-divider { height: 24px; width: 1px; background: var(--line); margin: 0 5px; }

.table-panel { margin-top: 14px; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { padding: 13px 16px; background: #f3f5f8; color: var(--faint); font-size: 9px; font-weight: 800; letter-spacing: .13em; text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }
td { padding: 15px 16px; border-bottom: 1px solid var(--line); color: #4d5a6e; white-space: nowrap; }
tr:last-child td { border-bottom: 0; }
tbody tr { cursor: pointer; }
tbody tr:hover { background: #fffaf0; }
td strong, td.strong { color: var(--ink); }
td small { display: block; color: var(--faint); margin-top: 4px; }
.mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-variant-numeric: tabular-nums; }
.strong { font-weight: 700; }
.danger { color: var(--red) !important; font-weight: 750; }
.arrow-cell { color: var(--faint); text-align: right; }
.status { display: inline-flex; align-items: center; min-height: 27px; border-radius: 16px; padding: 5px 10px; font-size: 10px; font-weight: 760; white-space: nowrap; }
.status-green { color: var(--green); background: var(--green-soft); }
.status-amber { color: #9a6200; background: var(--accent-soft); }
.status-blue { color: var(--blue); background: var(--blue-soft); }
.status-red { color: var(--red); background: var(--red-soft); }
.status-slate { color: var(--muted); background: #eef1f5; }
.progress-cell { display: flex; align-items: center; gap: 9px; }
.progress-cell i { width: 72px; height: 6px; border-radius: 4px; background: #e8ecf1; overflow: hidden; }
.progress-cell b { display: block; height: 100%; background: var(--green); border-radius: 4px; }
.progress-cell em { font-style: normal; font-family: "SFMono-Regular", Consolas, monospace; }

.detail-list { margin: 0; padding: 4px 22px 14px; }
.detail-list > div { display: flex; justify-content: space-between; gap: 18px; padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 11px; }
.detail-list > div:last-child { border-bottom: 0; }
.detail-list dt { color: var(--faint); }
.detail-list dd { margin: 0; color: var(--ink); font-weight: 650; text-align: right; }

.journey-panel { margin-top: 22px; padding-bottom: 6px; }
.journey-row { display: grid; grid-template-columns: 112px repeat(5, 1fr); gap: 0; padding: 24px 22px 22px; border-bottom: 1px solid var(--line); }
.journey-row:last-child { border-bottom: 0; }
.journey-label { font-size: 10px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; padding-top: 4px; }
.blue-label { color: var(--blue); }
.amber-label { color: var(--accent-deep); }
.journey-step { position: relative; min-height: 84px; padding-right: 12px; }
.journey-step::after { content: ""; position: absolute; top: 11px; left: 29px; right: 8px; height: 2px; background: var(--line-strong); }
.journey-step:last-child::after { display: none; }
.journey-step > span { position: relative; z-index: 1; width: 23px; height: 23px; border-radius: 50%; background: #edf0f4; color: var(--muted); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; }
.journey-step.complete > span { background: var(--green); color: white; }
.journey-step.complete::after { background: var(--green); }
.journey-step.actionable > span { background: white; color: var(--accent-deep); border: 2px solid var(--accent); }
.journey-step strong, .journey-step small { display: block; }
.journey-step strong { margin-top: 10px; max-width: 130px; font-size: 10px; line-height: 1.3; }
.journey-step small { margin-top: 4px; color: var(--faint); font-size: 9px; }
.journey-step button { margin-top: 6px; border: 0; border-radius: 7px; background: var(--accent); padding: 5px 8px; font-size: 9px; font-weight: 800; cursor: pointer; }
.party-grid, .cargo-grid { display: grid; }
.party-grid { grid-template-columns: repeat(3, 1fr); }
.cargo-grid { grid-template-columns: repeat(4, 1fr); }
.party-grid > div, .cargo-grid > div { padding: 22px; border-right: 1px solid var(--line); }
.party-grid > div:last-child, .cargo-grid > div:last-child { border-right: 0; }
.party-grid span, .cargo-grid span { display: block; color: var(--faint); font-size: 9px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
.party-grid strong, .party-grid small, .cargo-grid strong { display: block; }
.party-grid strong { margin: 11px 0 5px; font-size: 12px; }
.party-grid small { color: var(--muted); font-size: 10px; }
.cargo-grid strong { margin-top: 10px; font-family: "SFMono-Regular", Consolas, monospace; font-size: 15px; }
.charge-lines { padding: 10px 22px 22px; }
.charge-lines > div { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--line); font-size: 12px; }
.charge-lines strong { font-family: "SFMono-Regular", Consolas, monospace; }
.charge-lines .charge-total { padding-top: 20px; color: var(--ink); font-weight: 800; border-bottom: 0; }
.charge-total strong { font-size: 22px; }
.note-box { margin: 0 22px 22px; padding: 14px; background: #f3f6fa; border-radius: 10px; color: var(--muted); font-size: 10px; line-height: 1.5; }

.alphabet-bar { min-height: 62px; margin-bottom: 14px; border: 1px solid var(--line); background: #f4f6f9; display: flex; align-items: center; gap: 0; overflow-x: auto; }
.alphabet-bar > span { padding: 0 22px; color: var(--faint); font-size: 10px; font-weight: 800; letter-spacing: .11em; text-transform: uppercase; white-space: nowrap; }
.alphabet-bar button { flex: 1 0 46px; height: 44px; border: 0; border-left: 1px solid #eef1f5; background: #f7f8fa; color: var(--muted); font-size: 11px; cursor: pointer; }
.alphabet-bar button.selected { background: var(--accent-soft); color: #855700; }
.alphabet-bar button:disabled { color: #d7dde5; cursor: default; }
.network-map-layout { display: grid; grid-template-columns: minmax(0, 1fr) 330px; gap: 18px; margin: 14px 0 22px; }
.map-panel, .map-location-list { min-height: 510px; }
.map-stage { position: relative; height: 436px; background: #e9edf2; }
.cfs-map { height: 100%; width: 100%; z-index: 1; }
.leaflet-container { z-index: 1; font-family: inherit; background: #e9edf2; }
.leaflet-control-attribution { font-size: 8px !important; }
.map-state { position: absolute; z-index: 2; inset: 0; display: grid; place-items: center; padding: 24px; text-align: center; color: var(--muted); background: #eef2f6; font-size: 12px; }
.cfs-map-marker { background: transparent; border: 0; }
.cfs-pin { width: 38px; height: 38px; display: grid; place-items: center; border: 3px solid white; border-radius: 50% 50% 50% 0; background: var(--ink); color: white; transform: rotate(-45deg); box-shadow: 0 6px 14px rgba(21,34,53,.28); transition: background .18s ease, transform .18s ease; }
.cfs-pin b { transform: rotate(45deg); font-size: 8px; letter-spacing: .05em; }
.cfs-pin-selected { background: var(--accent); color: var(--ink); transform: rotate(-45deg) scale(1.13); box-shadow: 0 8px 18px rgba(169,106,0,.35); }
.map-location-list { display: flex; flex-direction: column; }
.map-list-scroll { flex: 1; overflow-y: auto; max-height: 436px; }
.map-location-button { width: 100%; min-height: 71px; display: grid; grid-template-columns: 42px 1fr auto; align-items: center; gap: 12px; border: 0; border-bottom: 1px solid var(--line); background: white; padding: 12px 16px; text-align: left; cursor: pointer; }
.map-location-button:hover, .map-location-button.selected { background: #fffaf0; }
.map-location-button.selected { box-shadow: inset 3px 0 0 var(--accent); }
.map-location-button > span:nth-child(2) { min-width: 0; }
.map-location-button strong, .map-location-button small { display: block; }
.map-location-button strong { color: var(--ink); font-size: 11px; }
.map-location-button small { margin-top: 4px; color: var(--muted); font-size: 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.map-location-button > span:last-child { color: var(--faint); }
.map-location-code { width: 38px; height: 31px; display: grid; place-items: center; border-radius: 8px; background: #edf1f5; color: #536176; font: 700 10px "SFMono-Regular", Consolas, monospace; }
.empty-list { padding: 24px; color: var(--muted); font-size: 11px; }
.estimator-panel { margin: 0 0 22px; }
.estimator-grid { display: grid; grid-template-columns: minmax(0, 1.35fr) minmax(330px, .65fr); }
.estimate-form { padding: 24px; }
.field-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field > span { color: var(--faint); font-size: 9px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
.field input, .field select { width: 100%; height: 43px; border: 1px solid var(--line-strong); border-radius: 9px; background: white; color: var(--ink); padding: 0 12px; font-size: 12px; outline: 0; }
.field input:focus, .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(242,163,11,.13); }
.checkbox-field { min-height: 43px; align-self: end; display: flex; align-items: center; gap: 10px; padding: 8px 11px; border: 1px solid var(--line-strong); border-radius: 9px; cursor: pointer; }
.checkbox-field input { width: 16px; height: 16px; accent-color: var(--accent-deep); }
.checkbox-field span, .checkbox-field strong, .checkbox-field small { display: block; }
.checkbox-field strong { color: var(--ink); font-size: 10px; }
.checkbox-field small { margin-top: 2px; color: var(--faint); font-size: 8px; line-height: 1.3; }
.estimate-form-footer { display: flex; align-items: center; justify-content: space-between; gap: 18px; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--line); }
.estimate-form-footer p { max-width: 440px; margin: 0; color: var(--muted); font-size: 10px; line-height: 1.5; }
.estimate-summary { background: var(--ink); color: white; padding: 24px; }
.estimate-route { display: flex; align-items: center; gap: 9px; padding-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,.13); font-size: 10px; }
.estimate-route span { color: #aeb9c7; }
.estimate-route i { color: var(--accent); font-style: normal; }
.estimate-summary dl { margin: 10px 0 18px; }
.estimate-summary dl > div { display: flex; justify-content: space-between; gap: 15px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.1); font-size: 11px; }
.estimate-summary dt { color: #aeb9c7; }
.estimate-summary dd { margin: 0; font-family: "SFMono-Regular", Consolas, monospace; font-weight: 700; }
.estimate-summary .estimate-subtotal { color: var(--accent); border-bottom: 0; font-weight: 800; }
.estimate-summary .estimate-subtotal dt { color: var(--accent); }
.estimate-total { border-radius: 11px; background: rgba(255,255,255,.08); padding: 16px; }
.estimate-total span, .estimate-total strong, .estimate-total small { display: block; }
.estimate-total span { color: #aeb9c7; font-size: 9px; letter-spacing: .1em; text-transform: uppercase; }
.estimate-total strong { margin: 6px 0 4px; color: var(--accent); font-size: 30px; letter-spacing: -.04em; }
.estimate-total small { color: #8f9daf; font-size: 8px; }
.network-head, .network-summary { display: grid; grid-template-columns: 1.05fr .32fr .42fr 2.2fr .45fr .45fr; align-items: center; }
.network-head { min-height: 54px; padding: 0 22px; background: #f3f5f8; color: var(--faint); font-size: 9px; font-weight: 800; letter-spacing: .13em; text-transform: uppercase; }
.network-summary { width: 100%; min-height: 70px; border: 0; background: white; text-align: left; padding: 0 22px; cursor: pointer; border-top: 1px solid var(--line); color: var(--muted); font-size: 12px; }
.network-summary:hover, .network-row.expanded .network-summary { background: #fffaf0; }
.network-summary strong { color: var(--ink); font-size: 13px; }
.network-summary > span:first-child { display: none; }
.network-summary > span:last-child { color: #946000; justify-self: end; font-weight: 700; }
.code-chip { justify-self: start; padding: 6px 9px; border-radius: 8px; background: #edf1f5; color: #546277; font-family: "SFMono-Regular", Consolas, monospace; }
.location-detail { display: grid; grid-template-columns: 1fr 1fr 230px; gap: 16px; padding: 26px; background: #fffaf0; border-top: 1px solid var(--line); }
.location-detail > div:not(.location-action) { background: white; border: 1px solid var(--line); border-radius: 12px; padding-top: 18px; }
.location-detail h2, .location-detail .section-kicker { margin-left: 22px; margin-right: 22px; }
.location-detail h2 { margin-bottom: 10px; font-size: 17px; }
.location-action { background: var(--ink); color: white; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; gap: 24px; font-size: 12px; line-height: 1.5; }
.location-action .button { background: var(--accent); color: var(--ink); }

.legend { display: flex; gap: 15px; color: var(--muted); font-size: 10px; }
.legend span { display: flex; align-items: center; gap: 6px; }
.legend i { width: 9px; height: 9px; border-radius: 3px; }
.legend-cubic { background: var(--accent); }
.legend-weight { background: #9ab0cc; }
.bar-chart { height: 300px; padding: 34px 24px 20px 58px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 18px; position: relative; background: repeating-linear-gradient(to bottom, transparent 0, transparent 56px, #edf0f4 57px); }
.chart-axis { position: absolute; left: 18px; top: 26px; bottom: 38px; display: flex; flex-direction: column; justify-content: space-between; color: var(--faint); font-size: 8px; }
.bar-group { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; min-width: 0; }
.bars { width: 100%; height: 220px; display: flex; align-items: flex-end; justify-content: center; gap: 4px; }
.bar { width: min(22px, 38%); min-height: 4px; border-radius: 5px 5px 2px 2px; }
.bar.cubic { background: var(--accent); }
.bar.weight { background: #9ab0cc; }
.bar-group strong { margin-top: 7px; font-size: 9px; }
.bar-group small, .cost-column small { color: var(--faint); font-size: 9px; margin-top: 4px; }
.cost-chart { height: 210px; padding: 32px 20px 18px; display: flex; align-items: flex-end; gap: 9px; background: repeating-linear-gradient(to bottom, transparent 0, transparent 51px, #edf0f4 52px); }
.cost-column { flex: 1; display: flex; align-items: center; flex-direction: column; justify-content: flex-end; }
.cost-column > span { width: 78%; max-width: 32px; min-height: 18px; border-radius: 5px 5px 2px 2px; background: var(--green); }
.cost-column strong { margin-top: 6px; font-size: 8px; }
.chart-callout { border-top: 1px solid var(--line); padding: 17px 22px; display: grid; grid-template-columns: 1fr auto; align-items: center; }
.chart-callout span { color: var(--muted); font-size: 11px; }
.chart-callout strong { font-size: 25px; letter-spacing: -.04em; }
.chart-callout small { grid-column: 1 / -1; color: var(--faint); font-size: 9px; margin-top: 2px; }
.equipment-list { padding: 4px 22px 12px; }
.equipment-row { display: grid; grid-template-columns: 1fr 1.3fr .7fr 1fr .75fr; align-items: center; gap: 18px; padding: 16px 0; border-bottom: 1px solid var(--line); font-size: 11px; }
.equipment-row:last-child { border-bottom: 0; }
.equipment-row > div { display: flex; flex-direction: column; gap: 3px; }
.equipment-row span, .equipment-row small { color: var(--faint); font-size: 9px; }
.equipment-row i { height: 5px; border-radius: 3px; background: #e9edf2; overflow: hidden; margin-top: 3px; }
.equipment-row i b { display: block; height: 100%; background: var(--accent); }
.spend-donut { display: grid; grid-template-columns: 128px 1fr; align-items: center; gap: 18px; padding: 24px; }
.donut { width: 122px; height: 122px; border-radius: 50%; background: conic-gradient(var(--ink) 0 51%, var(--accent) 51% 90%, #9ab0cc 90% 100%); display: grid; place-items: center; }
.donut::after { content: ""; width: 72px; height: 72px; border-radius: 50%; background: white; grid-area: 1 / 1; }
.donut span { grid-area: 1 / 1; z-index: 1; display: flex; flex-direction: column; text-align: center; }
.donut strong { font-size: 20px; }
.donut small { color: var(--faint); font-size: 8px; }
.spend-donut ul { padding: 0; margin: 0; list-style: none; }
.spend-donut li { display: grid; grid-template-columns: 9px 1fr auto; align-items: center; gap: 7px; padding: 8px 0; font-size: 9px; color: var(--muted); border-bottom: 1px solid var(--line); }
.spend-donut li:last-child { border-bottom: 0; }
.spend-donut li i { width: 8px; height: 8px; border-radius: 3px; }
.spend-donut li strong { color: var(--ink); }
.spend-one { background: var(--ink); }.spend-two { background: var(--accent); }.spend-three { background: #9ab0cc; }
.insight-note { margin: 0 22px 22px; background: var(--accent-soft); border-radius: 10px; padding: 14px; }
.insight-note strong { color: #8f5d00; font-size: 10px; }
.insight-note p { margin: 4px 0 0; color: #6d5c39; font-size: 9px; line-height: 1.55; }
.allocation-panel { margin-top: 22px; }

.upload-zone { min-height: 390px; margin-top: 22px; border: 1px dashed #b9c2cf; border-radius: 14px; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; cursor: pointer; text-align: center; }
.upload-zone:hover { background: #fffdf7; border-color: var(--accent-deep); }
.upload-zone input { position: absolute; opacity: 0; pointer-events: none; }
.upload-icon { width: 48px; height: 48px; border-radius: 14px; background: var(--accent-soft); color: #8c5b00; display: grid; place-items: center; font-size: 22px; }
.upload-zone strong { margin-top: 6px; font-size: 16px; }
.upload-zone small { color: var(--faint); font-size: 11px; }
.upload-zone .button { margin-top: 12px; }
.manifest-ready { margin-top: 22px; }
.success-banner { min-height: 86px; padding: 15px 20px; background: #f0fbf7; border-bottom: 1px solid #cfeadf; display: flex; align-items: center; gap: 14px; }
.success-banner > span { width: 36px; height: 36px; border-radius: 50%; display: grid; place-items: center; background: var(--green); color: white; }
.success-banner > div { flex: 1; }
.success-banner strong { font-size: 13px; }.success-banner p { margin: 4px 0 0; color: var(--muted); font-size: 10px; }
.toast { position: fixed; z-index: 100; left: 50%; bottom: 28px; transform: translateX(-50%); background: var(--ink); color: white; border-radius: 11px; padding: 13px 19px; font-size: 11px; font-weight: 700; box-shadow: 0 12px 28px rgba(16,28,45,.25); }

@media (max-width: 1180px) {
  .top-nav { grid-template-columns: auto 1fr; padding: 10px 20px; gap: 12px; }
  .top-nav nav { grid-column: 1 / -1; grid-row: 2; }
  .nav-tools { justify-self: end; }
  .global-search { width: 180px; }
  .dashboard-grid, .shipment-grid, .insight-chart-grid, .insight-bottom-grid { grid-template-columns: 1fr; }
  .side-stack { display: grid; grid-template-columns: repeat(2, 1fr); }
  .overview-main-stack { display: flex; }
  .network-map-layout { grid-template-columns: minmax(0, 1fr) 300px; }
  .estimator-grid { grid-template-columns: 1fr; }
  .estimate-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 0 28px; }
  .estimate-route { grid-column: 1 / -1; }
  .estimate-total { align-self: end; margin-bottom: 18px; }
  .location-detail { grid-template-columns: 1fr 1fr; }
  .location-action { grid-column: 1 / -1; flex-direction: row; align-items: center; }
}

@media (max-width: 760px) {
  .utility-bar { display: none; }
  .top-nav { top: 0; grid-template-columns: 1fr auto; padding: 10px 14px; }
  .brand small, .global-search { display: none; }
  .nav-item { padding: 9px 10px; }
  .nav-item span { display: none; }
  main { padding: 24px 14px 50px; }
  .page-header { align-items: flex-start; flex-direction: column; }
  .header-actions { justify-content: flex-start; }
  .container-banner-top { align-items: flex-start; }
  .container-meta { grid-template-columns: repeat(2, 1fr); }
  .container-meta > div { border-bottom: 1px solid rgba(255,255,255,.1); }
  .container-meta > div:nth-child(2n) { border-right: 0; }
  .container-meta > div:last-child { border-bottom: 0; }
  .container-milestones { padding-left: 20px; padding-right: 20px; }
  .metric-strip-four, .metric-strip-three, .insight-metrics { grid-template-columns: repeat(2, 1fr); }
  .metric-cell:nth-child(2) { border-right: 0; }
  .metric-cell { border-bottom: 1px solid var(--line); }
  .metric-cell:nth-last-child(-n+2) { border-bottom: 0; }
  .side-stack { display: flex; }
  .filter-bar { flex-wrap: nowrap; overflow-x: auto; border-radius: 0; margin-left: -14px; margin-right: -14px; }
  .filter-chip { white-space: nowrap; }
  .network-map-layout { grid-template-columns: 1fr; }
  .map-panel, .map-location-list { min-height: auto; }
  .map-stage { height: 360px; }
  .map-list-scroll { display: grid; grid-template-columns: repeat(2, 1fr); max-height: 280px; }
  .map-location-button { border-right: 1px solid var(--line); }
  .field-grid { grid-template-columns: 1fr; }
  .estimate-form-footer { align-items: stretch; flex-direction: column; }
  .estimate-form-footer .button { width: 100%; }
  .estimate-summary { display: block; }
  .estimate-total { margin-bottom: 0; }
  .journey-row { grid-template-columns: 1fr; gap: 12px; }
  .journey-label { margin-bottom: 8px; }
  .journey-step { min-height: 52px; padding-left: 34px; }
  .journey-step > span { position: absolute; left: 0; }
  .journey-step::after { top: 26px; left: 11px; width: 2px; height: 30px; }
  .journey-step strong { margin-top: 0; }
  .party-grid { grid-template-columns: 1fr; }
  .cargo-grid { grid-template-columns: repeat(2, 1fr); }
  .party-grid > div, .cargo-grid > div { border-right: 0; border-bottom: 1px solid var(--line); }
  .network-head { display: none; }
  .network-summary { grid-template-columns: 25px 1fr auto; gap: 8px; padding: 14px; }
  .network-summary > span:first-child { display: block; }
  .network-summary > span:nth-child(3), .network-summary > span:nth-child(5), .network-summary > span:nth-child(6), .network-summary > span:last-child { display: none; }
  .location-detail { grid-template-columns: 1fr; padding: 14px; }
  .location-action { grid-column: auto; flex-direction: column; align-items: stretch; }
  .bar-chart { gap: 7px; padding-left: 45px; }
  .equipment-row { grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .equipment-row > div:nth-child(4), .equipment-row > .status { display: none; }
  .success-banner { align-items: flex-start; flex-wrap: wrap; }
}
